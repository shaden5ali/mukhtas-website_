<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اختبار الميول الهندسية</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">

<style>
* {
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body {
background:#fffdf7;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
position:relative;
}

/* Overlay */

.system-overlay{
position:fixed;
inset:0;
background:#fffdf7;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
transition:1s ease;
}

.control-panel{
background:#17110d;
padding:50px;
border-radius:25px;
text-align:center;
width:420px;
color:white;
box-shadow:0 0 40px rgba(255,111,0,0.2);
}

.control-panel h2{
color:#ff6f00;
margin-bottom:10px;
}

#systemStatus{
margin-bottom:20px;
color:#aaa;
}

.lights{
display:flex;
justify-content:center;
gap:15px;
margin-bottom:20px;
}

.light{
width:15px;
height:15px;
border-radius:50%;
background:#333;
transition:0.3s;
}

.light.active{
background:#ff6f00;
box-shadow:0 0 10px #ff6f00;
}

.loader{
width:100%;
height:6px;
background:#333;
border-radius:20px;
overflow:hidden;
margin-bottom:25px;
}

.loader-bar{
width:0%;
height:100%;
background:#ff6f00;
transition:0.3s;
}

.activate-btn{
padding:12px 30px;
border:none;
border-radius:30px;
background:#ff6f00;
color:white;
cursor:pointer;
transition:0.3s;
}

.activate-btn:hover{
background:#e65100;
}

/* Quiz */

.quiz-container{
width:600px;
background:white;
padding:40px;
border-radius:25px;
box-shadow:0 20px 40px rgba(0,0,0,0.08);
display:flex;
flex-direction:row-reverse;
align-items:flex-start;
gap:20px;
position:relative;
}

.progress-container{
display:flex;
flex-direction:column;
align-items:center;
gap:5px;
}

.quiz-percentage{
font-weight:bold;
font-size:18px;
color:#333;
}

.progress-vertical{
width:15px;
height:350px;
background:#eee;
border-radius:20px;
overflow:hidden;
position:relative;
}

.progress-bar{
width:100%;
height:0%;
position:absolute;
bottom:0;
border-radius:20px;
background:linear-gradient(to top,#ff6f00,#ffd180);
transition:0.4s;
}

.quiz-content{
flex:1;
text-align:right;
position:relative;
}

.quiz-content h2{
color:#ff6f00;
margin-bottom:10px;
}

.question{
font-size:20px;
margin-bottom:20px;
color:#333;
}

.options button{
width:100%;
padding:15px;
margin-bottom:15px;
border:none;
border-radius:15px;
background:#fff3e0;
cursor:pointer;
transition:0.3s;
font-size:16px;
text-align:right;
}

.options button:hover{
background:#ffe0b2;
transform:translateY(-3px);
}

.options button.selected{
background:#ffcc80;
}

.next-btn{
width:100%;
padding:15px;
border:none;
border-radius:20px;
background:#ff6f00;
color:white;
font-size:16px;
cursor:pointer;
margin-top:10px;
display:none;
}

.prev-btn{
display:flex;
align-items:center;
gap:8px;
justify-content:flex-end;
background-color:#f7ab75;
border-radius:15px;
padding:10px 15px;
border:none;
cursor:pointer;
font-size:15px;
margin-bottom:15px;
color:white;
width:115%;
position:absolute;
top:-100px;
right:0;
}
.result-prev-btn {
    width: 100%;
    max-width: 600px;
    top: -60px;
    position: absolute;
    border-radius: 15px;
    padding: 10px 15px;
    cursor: pointer;

    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;

    background-color: #17110d;
    color: white;
    font-size: 16px;
    transition: 0.3s;
}

.result-prev-btn:hover {
    background-color: #555;
}

.result-prev-btn:active {
    background-color: #777;
}

.result-prev-btn span {
    transform: rotate(0deg);
}

/* Result */

.result-container{
width:600px;
background:#17110d;
padding:50px;
border-radius:25px;
text-align:center;
color:white;
box-shadow:0 0 40px rgba(255,111,0,0.2);
position:relative;
}

.result-container h2{
color:#ff6f00;
margin-bottom:20px;
}

.result-field{
font-size:28px;
font-weight:bold;
color:#ff6f00;
margin-top:20px;
}

/* شريط السؤال الحاسم */
.decisive-banner {
  position: absolute;
  left: -270px;
  top: -10px;
  background: #f69b56;
  color: white;
  padding: 10px 20px;
  border-radius: 10px;
  font-weight: bold;
  opacity: 0;
  transform: translateX(-20px);
  transition: all 0.8s ease;
  z-index: 10;
}
.decisive-banner.show {
  opacity: 1;
  transform: translateX(0);
}
</style>
</head>

<body>

<div class="system-overlay" id="systemOverlay">
<div class="control-panel">
<h2>نظام تحليل الميول الهندسية</h2>
<p id="systemStatus">الحالة: غير مفعل</p>

<div class="lights">
<span class="light"></span>
<span class="light"></span>
<span class="light"></span>
<span class="light"></span>
</div>

<div class="loader">
<div class="loader-bar" id="loaderBar"></div>
</div>

<button class="activate-btn" id="activateBtn">تشغيل النظام</button>

</div>
</div>

<div class="quiz-container">

<div class="progress-container">
<div class="quiz-percentage" id="quizPercentage">0%</div>

<div class="progress-vertical">
<div class="progress-bar" id="progressBar"></div>
</div>
</div>

<div class="quiz-content">

<h2>اختبار تحديد التخصص الهندسي</h2>

<button class="prev-btn" id="prevBtn">➔ السؤال السابق</button>

<div class="question" id="question"></div>

<div class="options" id="options"></div>

<button class="next-btn" id="nextBtn">التالي</button>

</div>
</div>

<script>

const activateBtn=document.getElementById("activateBtn");
const systemOverlay=document.getElementById("systemOverlay");
const systemStatus=document.getElementById("systemStatus");
const lights=document.querySelectorAll(".light");
const loaderBar=document.getElementById("loaderBar");

activateBtn.onclick=()=>{

activateBtn.disabled=true;

systemStatus.innerText="جاري تهيئة النظام...";

let progress=0;
let lightIndex=0;

const interval=setInterval(()=>{

progress+=5;

loaderBar.style.width=progress+"%";

if(lightIndex<lights.length){

lights[lightIndex].classList.add("active");

lightIndex++;

}

if(progress>=100){

clearInterval(interval);

systemStatus.innerText="تم تفعيل النظام ✔";

setTimeout(()=>{

systemOverlay.style.opacity="0";

setTimeout(()=>{

systemOverlay.style.display="none";

},1000);

},1000);

}

},150);

};

const questions = [

{
question:"لو عندك لاب في الجامعة، أي تجربة تفضّل؟",
options:[
"أ) تجربة محرك أو آلة لمعرفة كيف تتحرك الأجزاء وتعمل معًا.",
"ب) بناء دائرة إلكترونية أو جهاز صغير لمعرفة كيف تنتقل الكهرباء وتتحكم الإشارات.",
"ج) اختبار الخرسانة أو مواد البناء لمعرفة كيف تتحمل المباني الأحمال."
]
},

{
question:"أي موضوع يجذبك أكثر؟",
options:[
"أ) معرفة كيف تعمل المحركات والآلات وتقوم بالحركة بطريقة دقيقة.",
"ب) فهم كيف تنتقل الكهرباء وتعمل الأجهزة الذكية.",
"ج) دراسة كيف تتحمل المباني والجسور الأحمال وتبقى ثابتة."
]
},

{
question:"أي نوع رسومات تحب أكثر؟",
options:[
"أ) رسومات الآلات والأجزاء الميكانيكية لتفهم كيفية الحركة.",
"ب) مخططات الدوائر الكهربائية والإلكترونية لفهم الأسلاك والمكونات.",
"ج) مخططات المباني والجسور لرؤية كيفية توزيع القوى."
]
},

{
question:"أي شيء تحب تفهمه بعمق؟",
options:[
"أ) كيف تتحرك الأشياء وتعمل الآلات بأجزاءها المختلفة.",
"ب) كيف تنتقل الطاقة والإشارات بين الأجهزة لتعمل بشكل صحيح.",
"ج) كيف تصمد المباني والجسور تحت الأحمال المختلفة."
]
},

{
question:"تحب تشتغل على:",
options:[
"أ) أجزاء ميكانيكية تتحرك معًا لتكوين آلة.",
"ب) مكونات إلكترونية تتفاعل لتعمل الأجهزة.",
"ج) مواد البناء مثل الخرسانة والحديد لتشييد المباني."
]
},

{
question:"لو عندك مشروع تخرج، تختار:",
options:[
"أ) تصميم آلة أو نظام ميكانيكي يعمل بكفاءة.",
"ب) تصميم نظام كهربائي أو إلكتروني ذكي.",
"ج) تصميم مبنى أو جسر متين."
]
},

{
question:"أي نوع تفكير تحب؟",
options:[
"أ) تحليل حركة الأجزاء والتأكد من عملها بسلاسة.",
"ب) تحليل كيفية انتقال الإشارات والطاقة بين الأجهزة.",
"ج) تحليل توزيع القوى على المباني والهياكل لضمان الثبات."
]
},

{
question:"أي بيئة عمل تفضل؟",
options:[
"أ) مصانع ومعدات حيث تتحرك الآلات.",
"ب) شركات تقنية وكهربائية حيث تعمل الأجهزة والأنظمة الذكية.",
"ج) مواقع بناء حيث تُشيد المباني والجسور."
]
},

{
question:"أي إنجاز تحب تشوفه؟",
options:[
"أ) آلة أو جهاز ميكانيكي يعمل بكفاءة.",
"ب) نظام كهربائي أو إلكتروني يعمل بشكل صحيح.",
"ج) مبنى أو جسر تم إنشاؤه بنجاح."
]
},

{
question:"أي مشروع عالمي يثير اهتمامك؟",
options:[
"أ) تطوير سيارات أو طائرات.",
"ب) محطات طاقة أو أنظمة ذكية.",
"ج) مدن وجسور حديثة."
]
},

{
question:"لو زرت معرض هندسي، تتجه إلى:",
options:[
"أ) السيارات والآلات لمعرفة كيفية عملها.",
"ب) الأجهزة والإلكترونيات لمعرفة كيفية عمل الأنظمة الذكية.",
"ج) نماذج المدن والجسور لمشاهدة الهياكل الكبرى."
]
},

{
question:"تحب تشوف نتيجة عملك على شكل:",
options:[
"أ) آلة أو جهاز ميكانيكي يعمل بسلاسة.",
"ب) نظام كهربائي أو إلكتروني يعمل بكفاءة.",
"ج) مبنى أو جسر متين وعملي."
]
},

{
question:"أي شيء تحب تطوره؟",
options:[
"أ) تحسين حركة وكفاءة الآلات.",
"ب) تحسين أداء الأنظمة الكهربائية والإلكترونية.",
"ج) تحسين قوة وثبات المباني والهياكل."
]
},

{
question:"لو تعمل في فريق هندسي، أي دور يعجبك أكثر؟",
options:[
"أ) تصميم وتشغيل الآلات.",
"ب) تصميم وتشغيل الأنظمة الكهربائية.",
"ج) تصميم وإنشاء الهياكل والمباني."
]
},

{
question:"أي نوع مشكلة تحب حلها؟",
options:[
"أ) آلة لا تعمل بكفاءة وتحتاج تعديل.",
"ب) نظام كهربائي لا يعمل كما يجب.",
"ج) مشكلة في تصميم أو ثبات المبنى."
]
},

// السؤال الحاسم الأخير
{
question:"لو أتيحت لك فرصة قيادة مشروع هندسي كبير، أي مشروع تختار؟",
decisive:true,
options:[
"أ) تصميم نظام ميكانيكي لروبوت أو آلة متحركة تقوم بمهام معقدة.",
"ب) تطوير نظام كهربائي ذكي يتحكم في الأجهزة والطاقة داخل مدينة أو مصنع.",
"ج) تصميم جسر أو مبنى ضخم يتحمل الأحمال ويخدم آلاف الناس."
]
}

];

let currentQuestion=0;
let userAnswers=[];

const questionEl=document.getElementById("question");
const optionsEl=document.getElementById("options");
const nextBtn=document.getElementById("nextBtn");
const prevBtn=document.getElementById("prevBtn");
const progressBar=document.getElementById("progressBar");
const quizPercentage=document.getElementById("quizPercentage");

// إنشاء عنصر شريط السؤال الحاسم
const decisiveBanner = document.createElement("div");
decisiveBanner.classList.add("decisive-banner");
decisiveBanner.innerText = "السؤال الحاسم ⛓️‍💥🎰";
document.querySelector(".quiz-content").appendChild(decisiveBanner);

function showDecisiveBanner(show) {
  if(show){
    decisiveBanner.classList.add("show");
    setTimeout(() => {
      decisiveBanner.classList.remove("show");
    }, 6000);
  }
}

function loadQuestion(){

const q=questions[currentQuestion];

questionEl.innerText=q.question;

optionsEl.innerHTML="";

nextBtn.style.display="none";

prevBtn.style.display=currentQuestion>0?"flex":"none";

q.options.forEach(option=>{

const button=document.createElement("button");

button.innerText=option;

button.onclick=()=>{

document.querySelectorAll(".options button").forEach(btn=>btn.classList.remove("selected"));

button.classList.add("selected");

nextBtn.style.display="block";

};

optionsEl.appendChild(button);

});

// اظهار شريط السؤال الحاسم للسؤال الحاسم
if(q.decisive){
  showDecisiveBanner(true);
}

let percent=Math.round((currentQuestion/questions.length)*100);

quizPercentage.innerText=percent+"%";

progressBar.style.height=percent+"%";

}

nextBtn.onclick=()=>{

const selected=document.querySelector(".options button.selected");

if(selected){

userAnswers[currentQuestion]=selected.innerText;

currentQuestion++;

if(currentQuestion<questions.length){

loadQuestion();

}else{

showResult();

}

}

};

prevBtn.onclick=()=>{

currentQuestion--;

loadQuestion();

};
function showResult() {

systemOverlay.style.display="flex";
systemOverlay.style.opacity="1";

let mech=0;
let elec=0;
let civil=0;

userAnswers.forEach(ans=>{

let multiplier = 1;
const qIndex = userAnswers.indexOf(ans);
if(questions[qIndex].decisive) multiplier = 2;

if(ans.startsWith("أ")) mech+=multiplier;
else if(ans.startsWith("ب")) elec+=multiplier;
else civil+=multiplier;

});

let result="";

if(mech>elec && mech>civil){
result="الهندسة الميكانيكية ⚙️";
}
else if(elec>mech && elec>civil){
result="الهندسة الكهربائية ⚡";
}
else{
result="الهندسة المدنية 🏗️";
}

systemOverlay.innerHTML=`

<div class="result-container">

<h2>تخصصك الهندسي هو:</h2>

<button class="prev-btn result-prev-btn" id="resultPrevBtn">
<span>➔</span> الرجوع لآخر سؤال
</button>

<div class="gears" id="gears"></div>

<div class="result-text" id="resultText">
جاري تحليل إجاباتك...
</div>

<div class="result-field" id="resultField">
${result}
</div>

</div>

`;

document.getElementById("resultPrevBtn").onclick=()=>{

systemOverlay.style.opacity="0";

setTimeout(()=>{
systemOverlay.style.display="none";
currentQuestion=questions.length-1;
loadQuestion();
},500);

};

const gearsEl=document.getElementById("gears");
const resultText=document.getElementById("resultText");
const resultField=document.getElementById("resultField");

resultField.style.display="none";

let gearCount=0;

const gearInterval=setInterval(()=>{

if(gearCount<5){

const span=document.createElement("span");
span.innerText="⚙️";

gearsEl.appendChild(span);

gearCount++;

}else{

clearInterval(gearInterval);

}

},400);

setTimeout(()=>{

resultText.style.display="none";
resultField.style.display="block";

},3000);

}
loadQuestion();

</script>

</body>
</html>
